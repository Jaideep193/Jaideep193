name: Update README Featured Projects

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Update Featured Projects in README
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: |
          python3 - <<'PYEOF'
          import os, re, requests

          username = os.environ["GH_USERNAME"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json"
          }

          # Language to badge color mapping
          LANG_COLORS = {
              "Python": "3776AB", "JavaScript": "F7DF1E", "TypeScript": "3178C6",
              "Java": "007396", "Go": "00ADD8", "C++": "00599C", "C": "A8B9CC",
              "HTML": "E34F26", "CSS": "1572B6", "Shell": "89E051",
              "Jupyter Notebook": "DA5B0B", "R": "276DC3", "Rust": "000000",
          }

          # Language to emoji mapping
          LANG_EMOJI = {
              "Python": "🐍", "JavaScript": "🌐", "TypeScript": "🔷",
              "Java": "☕", "Go": "🐹", "Jupyter Notebook": "📓",
              "HTML": "🌐", "C++": "⚙️", "Shell": "🖥️", "R": "📊",
          }

          # Fetch all repos (owner type, sorted by updated)
          repos = []
          page = 1
          while True:
              r = requests.get(
                  "https://api.github.com/user/repos",
                  headers=headers,
                  params={"per_page": 100, "page": page, "sort": "updated", "type": "owner"}
              )
              data = r.json()
              if not isinstance(data, list) or not data:
                  break
              repos.extend(data)
              page += 1

          # Filter: only repos with a description, exclude profile repo itself
          featured = [
              r for r in repos
              if r.get("description")
              and r["name"].lower() != username.lower()
              and not r.get("fork", False)
              and not r.get("archived", False)
          ]

          # Sort by stars desc, then updated desc
          featured.sort(key=lambda r: (-r.get("stargazers_count", 0), r.get("updated_at", "")), reverse=False)
          featured = featured[:12]  # cap at 12 entries

          # Build Featured Projects markdown entries
          entries = []
          for repo in featured:
              name = repo["name"]
              desc = repo.get("description", "No description provided.").strip()
              url = repo["html_url"]
              lang = repo.get("language") or ""
              stars = repo.get("stargazers_count", 0)
              topics = repo.get("topics", [])
              updated = repo.get("updated_at", "")[:10]

              # Pick a project emoji based on topics/language/name
              emoji = "🚀"
              name_lower = name.lower()
              desc_lower = desc.lower()
              if any(k in name_lower + desc_lower for k in ["fire", "forest"]):
                  emoji = "🔥"
              elif any(k in name_lower + desc_lower for k in ["heart", "cardiac", "health", "medical"]):
                  emoji = "🫀"
              elif any(k in name_lower + desc_lower for k in ["portfolio", "website", "web"]):
                  emoji = "🌐"
              elif any(k in name_lower + desc_lower for k in ["java", "ecommerce", "shop", "commerce"]):
                  emoji = "☕"
              elif any(k in name_lower + desc_lower for k in ["ai", "chatbot", "bot", "gemini", "gpt", "llm"]):
                  emoji = "🤖"
              elif any(k in name_lower + desc_lower for k in ["house", "price", "predict", "regression"]):
                  emoji = "🏡"
              elif any(k in name_lower + desc_lower for k in ["face", "facial", "attendance", "recognition"]):
                  emoji = "🧑‍💼"
              elif any(k in name_lower + desc_lower for k in ["aqi", "air", "quality", "pollution", "delhi"]):
                  emoji = "🏙️"
              elif any(k in name_lower + desc_lower for k in ["gesture", "hand"]):
                  emoji = "✋"
              elif any(k in name_lower + desc_lower for k in ["data", "analytics", "analysis"]):
                  emoji = "📊"
              elif any(k in name_lower + desc_lower for k in ["cloud", "gcp", "aws", "azure"]):
                  emoji = "☁️"

              # Build badge line
              badges = []
              if lang:
                  color = LANG_COLORS.get(lang, "555555")
                  lang_slug = lang.replace(" ", "%20").replace("+", "%2B")
                  badges.append(f"![{lang}](https://img.shields.io/badge/{lang_slug}-{color}?style=flat-square&logo={lang_slug.lower()}&logoColor=white)")
              for topic in topics[:4]:
                  topic_display = topic.replace("-", " ").title()
                  topic_slug = topic.replace("-", "%20")
                  badges.append(f"![{topic_display}](https://img.shields.io/badge/{topic_slug}-0A66C2?style=flat-square)")

              badge_line = " ".join(badges) if badges else ""

              # Format the entry (matching existing README style)
              entry_lines = [f"### {emoji} [{name}]({url})"]
              if badge_line:
                  entry_lines.append(badge_line)
              entry_lines.append("")
              entry_lines.append(desc)
              if stars > 0:
                  entry_lines.append("")
                  entry_lines.append(f"> ⭐ {stars} stars &nbsp;|&nbsp; 📅 Updated: {updated}")
              entry_lines.append("")
              entry_lines.append("---")
              entries.append("\n".join(entry_lines))

          # Build the full replacement block
          new_section = "<!-- FEATURED-PROJECTS-START -->\n"
          new_section += "## 🚀 Featured Projects\n\n"
          new_section += "\n\n".join(entries)
          new_section += "\n\n<!-- FEATURED-PROJECTS-END -->"

          # Read README
          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          # Replace between FEATURED-PROJECTS markers
          pattern = r"<!-- FEATURED-PROJECTS-START -->.*?<!-- FEATURED-PROJECTS-END -->"
          if re.search(pattern, content, flags=re.DOTALL):
              new_content = re.sub(pattern, new_section, content, flags=re.DOTALL)
          else:
              # Inject just before the Certifications section if no markers found
              cert_pattern = r"(## 🏅 Certifications|## 🎖️)"
              if re.search(cert_pattern, content):
                  new_content = re.sub(cert_pattern, new_section + "\n\n\\1", content, count=1)
              else:
                  new_content = content.rstrip() + "\n\n" + new_section + "\n"

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)

          print(f"README.md updated: {len(featured)} projects added to Featured Projects section.")
          PYEOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-update Featured Projects in README [skip ci]"
          git push
